name: Automated Tests CI

# Тригери: коли запускати цей пайплайн
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    # Віртуальна машина, на якій все буде працювати
    runs-on: ubuntu-latest

    steps:
    # 1. Завантажуємо код з репозиторію на Runner
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Встановлюємо потрібне середовище (наприклад, Python)
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    # 3. Встановлюємо залежності для тестів
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest  # Додайте інші бібліотеки, якщо треба

    # 4. Запускаємо самі тести
    - name: Run Tests
      run: |
        pytest
